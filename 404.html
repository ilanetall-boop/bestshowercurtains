<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Best Shower Curtains</title>
  <style>
    :root { --primary: #00695C; --accent: #FF6F00; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #3e3e3e; background: #fafafa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .error-page { max-width: 540px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }
    .error-code { font-size: 7rem; font-weight: 800; color: var(--primary); opacity: .15; line-height: 1; }
    h1 { font-size: 1.75rem; font-weight: 700; color: var(--primary); margin: .5rem 0 .75rem; }
    p { color: #666; margin-bottom: 2rem; font-size: 1.05rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn { padding: .7rem 1.8rem; border-radius: .375rem; text-decoration: none; font-weight: 600; font-size: .95rem; display: inline-block; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-accent { background: var(--accent); color: #fff; }
    .site-name { margin-top: 2.5rem; font-size: .85rem; color: #999; }
    .site-name a { color: var(--primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <div class="links">
      <a href="/" class="btn btn-primary">Homepage</a>
      <a href="/articles.html" class="btn btn-accent">Browse Articles</a>
    </div>
    <div class="site-name"><a href="/">Best Shower Curtains</a></div>
  </div>
</body>
</html>
